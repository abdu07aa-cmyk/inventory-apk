<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#3b82f6" />
  <title>WarungKita PRO MAX - Enterprise POS</title>
  <meta name="description" content="Sistem POS modern untuk warung/toko — WarungKita PRO MAX" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="" crossorigin="anonymous" />
  <!-- Core CSS (modular) -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/print.css" media="print" />
  <!-- Favicon placeholder -->
  <link rel="icon" href="assets/icons/favicon.ico" />
</head>
<body class="app-root" data-theme="light">
  <!-- Accessible skip link -->
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- App wrapper -->
  <div id="app" class="app-layout">
    <!-- Sidebar / Navigation -->
    <aside class="sidebar" role="navigation" aria-label="Sidebar utama">
      <div class="brand">
        <h1 class="brand-title">WarungKita<span class="pro"> PRO MAX</span></h1>
      </div>

      <nav class="nav-main" aria-label="Main navigation">
        <ul>
          <li><a href="#" data-route="dashboard" class="active"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
          <li><a href="#" data-route="products"><i class="fa-solid fa-boxes-stacked"></i> Produk</a></li>
          <li><a href="#" data-route="pos"><i class="fa-solid fa-cash-register"></i> POS</a></li>
          <li><a href="#" data-route="transactions"><i class="fa-solid fa-receipt"></i> Transaksi</a></li>
          <li><a href="#" data-route="customers"><i class="fa-solid fa-users"></i> Pelanggan</a></li>
          <li><a href="#" data-route="shifts"><i class="fa-solid fa-user-clock"></i> Shift</a></li>
          <li><a href="#" data-route="reports"><i class="fa-solid fa-file-invoice-dollar"></i> Laporan</a></li>
          <li><a href="#" data-route="settings"><i class="fa-solid fa-gear"></i> Pengaturan</a></li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button id="toggle-theme" class="btn-ghost" aria-pressed="false" title="Toggle dark/light mode">
          <i class="fa-regular fa-sun"></i><i class="fa-regular fa-moon"></i>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-column">
      <header class="app-header" role="banner">
        <div class="header-left">
          <button id="open-sidebar" class="btn-icon" aria-label="Buka sidebar"><i class="fa-solid fa-bars"></i></button>
          <div class="search">
            <input id="global-search" type="search" placeholder="Cari produk, transaksi, pelanggan..." aria-label="Cari" />
          </div>
        </div>

        <div class="header-right">
          <div class="header-actions">
            <button id="btn-notifications" class="btn-icon" aria-label="Notifikasi"><i class="fa-solid fa-bell"></i></button>
            <div class="profile" aria-hidden="false">
              <button class="profile-btn" aria-haspopup="true" aria-expanded="false">
                <i class="fa-solid fa-user"></i> <span class="profile-name">Kasir</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="main" tabindex="-1" role="main" class="content-area">
        <!-- ROUTE: Dashboard -->
        <section id="view-dashboard" class="view active" aria-labelledby="dashboard-heading">
          <h2 id="dashboard-heading" class="sr-only">Dashboard</h2>
          <div class="dashboard-grid">
            <!-- Statistik ringkasan -->
            <div class="card" id="summary-cards">
              <!-- Content diisi via JS -->
            </div>

            <!-- Chart area -->
            <div class="card" id="sales-chart">
              <!-- Chart.js canvas akan di-render oleh charts.js -->
              <canvas id="chart-sales" width="400" height="180" aria-label="Grafik penjualan"></canvas>
            </div>

            <!-- Top products -->
            <div class="card" id="top-products">
              <!-- Diisi via produk/top list -->
            </div>
          </div>
        </section>

        <!-- ROUTE: Products -->
        <section id="view-products" class="view" aria-labelledby="products-heading" hidden>
          <h2 id="products-heading" class="sr-only">Produk</h2>
          <div id="products-toolbar" class="toolbar">
            <button id="btn-new-product" class="btn-primary"><i class="fa-solid fa-plus"></i> Produk Baru</button>
            <input id="products-filter" type="search" placeholder="Filter produk..." />
          </div>
          <div id="products-list" class="card-list">
            <!-- Daftar produk diisi oleh js/modules/products.js -->
          </div>
        </section>

        <!-- ROUTE: POS -->
        <section id="view-pos" class="view" aria-labelledby="pos-heading" hidden>
          <h2 id="pos-heading" class="sr-only">Point of Sale</h2>
          <div class="pos-layout">
            <aside class="pos-left">
              <div id="pos-products" class="card">
                <!-- Produk grid -->
              </div>
            </aside>
            <aside class="pos-right">
              <div id="pos-cart" class="card">
                <!-- Keranjang diisi oleh js/modules/cart.js -->
              </div>
            </aside>
          </div>
        </section>

        <!-- Placeholder untuk view lainnya (transactions, customers, shifts, reports, settings) -->
        <section id="view-transactions" class="view" hidden></section>
        <section id="view-customers" class="view" hidden></section>
        <section id="view-shifts" class="view" hidden></section>
        <section id="view-reports" class="view" hidden></section>
        <section id="view-settings" class="view" hidden></section>
      </main>

      <footer class="app-footer" role="contentinfo">
        <small>© <span id="current-year"></span> WarungKita PRO MAX — Built with ❤️</small>
      </footer>
    </div>
  </div>

  <!-- Global modals (mount point, content diisi oleh JS) -->
  <div id="modal-root" aria-live="polite"></div>

  <!-- External libraries (di-load tanpa inline JS) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>

  <!-- App scripts (ES modules) -->
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/state.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
